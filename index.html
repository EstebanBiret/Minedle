<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="assets/shop/pickaxes/diamond-pickaxe.webp" type="image/x-icon">
    <link rel="stylesheet" href="style.css?v=6" />
    <title>Minedle</title>
  </head>
  <body>

    <div id="background-blur"></div>

    <div id="sections-container">

      <div id="section-main">

        <div id="parametres" class="mc-ui-box">
          <span>Paramètres</span>
        </div>

        <div id="logo">
          <img src="./assets/home/logo.png" width="100%" alt="Logo du site"/>
        </div>

        <div id="blocs-actuels-infos">
          <span id="blocs-actuels" class="bolder green-text">0</span>
          <span class="bolder">blocs minés</span>
        </div>

        <div id="bloc-img-container">
          <img
            src="./assets/blocks/stone.webp"
            alt=""
            id="bloc-img"
            draggable="false"
          />
        </div>

        <div id="cps-infos" class="mc-ui-box">
          <span id="bps-label">par seconde : 0</span>
          <span id="bpc-label">par clic : 0</span>
        </div>

      </div>

      <div id="column-mid" class="mc-ui-box sections-parameters">

        <div id="section-entites">

        <script id="entite-template" type="text/template">
          <div class="mc-bar-ui entite tooltip-element disabled" onclick="buyEntity(&quot;{{nom}}&quot;)" id="{{nom}}-entite" data-tooltip-title="{{nom}}" data-tooltip-content='{{description}}'>
              <img src="{{image}}" alt="Image de {{nom}}" class="entite-img disabled"/>
            <div class="mid-section">
              <p class="entite-txt">{{nom}}</p>
              <div class="cout-info">
                <p class="cout-text entite-txt "><span class="disabled-cost" id="{{nom}}-cout">{{cout_actuel}}</span></p> 
                <img src="./assets/blocks/stone.webp" alt="" class="bloc-img-entite" />
              </div>
            </div>
            <div class="right-section entite-txt disabled"><span id="x-entite">x</span><span id="{{nom}}-quantite">0</span></div>
          </div>
        </script>

        <p class="mc-label">Entités</p>
        <div id="entites-container" class="container"></div>

        </div>

        <div id="section-boutique">

        <script id="boutique-template" type="text/template">
          <div class="mc-bar-ui boutique tooltip-element disabled" onclick="buyUpgrade(&quot;{{nom}}&quot;)" id="{{nom}}-amelioration" data-tooltip-title="{{nom}}" data-tooltip-content-deux='{{description}}'>
              <img src="{{image}}" alt="Image de {{nom}}" class="entite-img disabled"/>
            <div class="mid-section">
              <p class="entite-txt">{{nom}}</p>
              <div class="cout-info">
                <p class="cout-text entite-txt "><span class="disabled-cost" id="{{nom}}-cout">{{cout}}</span></p> 
                <img src="./assets/blocks/stone.webp" alt="" class="bloc-img-entite" />
              </div>
            </div>
            <div></div>
          </div>
        </script>

        <p class="mc-label">Boutique</p>
        <div id="boutique-container" class="container"></div>
        <p id="boutique-vide" class="boutique-vide-msg">Rien à acheter pour le moment...</p>

        </div>

      </div>

      <div id="section-inventaire" class="mc-ui-box sections-parameters">
        <p class="mc-label" id="inventaire-label">Inventaire (0/36)</p>
        <div class="grille">
          <div id="inventaire-1"></div>
          <div id="inventaire-2"></div>
          <div id="inventaire-3"></div>
          <div id="inventaire-4"></div>
          <div id="inventaire-5"></div>
          <div id="inventaire-6"></div>
          <div id="inventaire-7"></div>
          <div id="inventaire-8"></div>
          <div id="inventaire-9"></div>
          <div id="inventaire-10"></div>
          <div id="inventaire-11"></div>
          <div id="inventaire-12"></div>
          <div id="inventaire-13"></div>
          <div id="inventaire-14"></div>
          <div id="inventaire-15"></div>
          <div id="inventaire-16"></div>
          <div id="inventaire-17"></div>
          <div id="inventaire-18"></div>
          <div id="inventaire-19"></div>
          <div id="inventaire-20"></div>
          <div id="inventaire-21"></div>
          <div id="inventaire-22"></div>
          <div id="inventaire-23"></div>
          <div id="inventaire-24"></div>
          <div id="inventaire-25"></div>
          <div id="inventaire-26"></div>
          <div id="inventaire-27"></div>
          <div id="inventaire-28"></div>
          <div id="inventaire-29"></div>
          <div id="inventaire-30"></div>
          <div id="inventaire-31"></div>
          <div id="inventaire-32"></div>
          <div id="inventaire-33"></div>
          <div id="inventaire-34"></div>
          <div id="inventaire-35"></div>
          <div id="inventaire-36"></div>
        </div>

        <p id="succes-label" class="mc-label">Succès (0/30)</p>
        <div class="grille succes">
          <div id="succes-1"></div>
          <div id="succes-2"></div>
          <div id="succes-3"></div>
          <div id="succes-4"></div>
          <div id="succes-5"></div>
          <div id="succes-6"></div>
          <div id="succes-7"></div>
          <div id="succes-8"></div>
          <div id="succes-9"></div>
          <div id="succes-10"></div>
          <div id="succes-11"></div>
          <div id="succes-12"></div>
          <div id="succes-13"></div>
          <div id="succes-14"></div>
          <div id="succes-15"></div>
          <div id="succes-16"></div>
          <div id="succes-17"></div>
          <div id="succes-18"></div>
          <div id="succes-19"></div>
          <div id="succes-20"></div>
          <div id="succes-21"></div>
          <div id="succes-22"></div>
          <div id="succes-23"></div>
          <div id="succes-24"></div>
          <div id="succes-25"></div>
          <div id="succes-26"></div>
          <div id="succes-27"></div>
          <div id="succes-28"></div>
          <div id="succes-29"></div>
          <div id="succes-30"></div>
        </div>
      </div>

    </div>

    <div id="credits" class="mc-ui-box">
      <span>Crédits : 
        <span id="surtom" class="tooltip-element" data-tooltip-title="Design" data-tooltip-content-deux="Tooltips & interfaces de coffre dans le style de Minecraft">Surtom, </span>
        <span id="cookie" class="tooltip-element" data-tooltip-title="Gameplay" data-tooltip-content-deux="Mécanique du site inspiré du célèbre jeu 'Cookie Clicker'">Cookie Clicker</span>
      </span>
    </div>
  </body>

  <div id="tooltip" class="transparent">
    <div id="tooltip-title"></div>
    <div id="tooltip-content"></div>
    <div id="tooltip-content-deux"></div>
    <div id="tooltip-rendement-ratio"></div>
  </div>

  <div id="parametres-modal" class="modal">
    <div id="parametres-modal-content" class="mc-ui-box">

      <div>
        <span class="close" onclick="closeSettingsModal()">&times;</span>
      </div>

      <div id="importer-progression" class="mc-ui-button">
        <div class="title" onclick="importProgress()">Importer la progression</div>
      </div>
      <div id="exporter-progression" class="mc-ui-button">
        <div class="title" onclick="exportProgress()">Exporter la progression</div>
      </div>
      <div id="supprimer-progression" class="mc-ui-button">
        <div class="title" onclick="deleteProgress()">Supprimer la progression</div>
      </div>

    </div>
  </div>

  <div id="bonusDisplay"></div>

  <script type="module" src="index.js?v=6"></script>
</html>
